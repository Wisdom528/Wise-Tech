<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wise Tech Admin Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{
font-family:Poppins;
background:#05060a;
color:#fff;
padding:30px;
}

h1{
text-align:center;
color:#00d4ff;
}

.container{
max-width:1000px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
border:1px solid rgba(255,255,255,0.05);
}

input, textarea{
width:100%;
padding:10px;
margin:8px 0;
background:#000;
color:#fff;
border:none;
border-radius:8px;
}

button{
padding:10px;
width:100%;
margin-top:8px;
background:linear-gradient(135deg,#00d4ff,#0077ff);
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}

.post-list{
max-height:600px;
overflow:auto;
}

.post-item{
background:#0a0a0a;
padding:15px;
margin-bottom:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.05);
}

.post-item img{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
margin-bottom:10px;
}

.small{
font-size:11px;
color:#888;
word-break:break-all;
}

.actions{
display:flex;
gap:10px;
margin-top:10px;
}

.actions button{
flex:1;
padding:8px;
font-size:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" style="max-width:400px;margin:auto;text-align:center;">
<h2>Admin Login 🔐</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<p id="loginStatus"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

<h1>🔥 Wise Tech Admin Dashboard</h1>

<button onclick="logout()" style="max-width:200px;margin:auto;display:block;">
Logout
</button>

<div class="container">

<!-- CREATE POST -->
<div class="card">
<h2>Create Post</h2>

<input id="title" placeholder="Title">
<textarea id="content" placeholder="Content"></textarea>
<input id="readMore" placeholder="Read More Link">
<input id="image" placeholder="Image URL">

<button onclick="createPost()">Publish 🚀</button>

<p id="status"></p>
</div>

<!-- POSTS LIST -->
<div class="card post-list">
<h2>All Posts</h2>
<div id="posts"></div>
</div>

</div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
apiKey: "AIzaSyAL_1JkxU96Nfyd3gqj7_56XKO0_R0UrPM",
authDomain: "wisetech-blog-2.firebaseapp.com",
projectId: "wisetech-blog-2",
storageBucket: "wisetech-blog-2.firebasestorage.app",
messagingSenderId: "564533507468",
appId: "1:564533507468:web:9b6c938d2e866bf2ffd2a9"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

/* LOGIN */
function login(){
auth.signInWithEmailAndPassword(
document.getElementById("email").value,
document.getElementById("password").value
)
.then(()=>document.getElementById("loginStatus").innerText="✅ Logged in")
.catch(err=>document.getElementById("loginStatus").innerText=err.message);
}

/* LOGOUT */
function logout(){
auth.signOut();
}

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
document.getElementById("loginBox").style.display = user ? "none" : "block";
document.getElementById("dashboard").style.display = user ? "block" : "none";
});

/* CREATE POST (FIXED FIELDS) */
function createPost(){

let title = document.getElementById("title").value;
let content = document.getElementById("content").value;
let readMore = document.getElementById("readMore").value;
let image = document.getElementById("image").value;

if(!title || !content || !readMore || !image){
document.getElementById("status").innerText = "❌ Fill all fields";
return;
}

db.collection("posts").add({
title,
content,
readMore,
image,
createdAt: firebase.firestore.FieldValue.serverTimestamp()
})
.then(()=>{

document.getElementById("status").innerText="✅ Posted!";

document.getElementById("title").value="";
document.getElementById("content").value="";
document.getElementById("readMore").value="";
document.getElementById("image").value="";
});
}

/* LOAD POSTS */
function loadPosts(){

db.collection("posts")
.orderBy("createdAt","desc")
.onSnapshot(snapshot=>{

let html="";

snapshot.forEach(doc=>{
let p = doc.data();

html += `
<div class="post-item">
<img src="${p.image}">
<h4>${p.title}</h4>
<p class="small">${doc.id}</p>

<div class="actions">
<button onclick="copyId('${doc.id}')">Copy ID</button>
<button onclick="deletePost('${doc.id}')">Delete</button>
</div>
</div>
`;
});

document.getElementById("posts").innerHTML = html;
});
}

loadPosts();

/* DELETE */
function deletePost(id){
db.collection("posts").doc(id).delete();
}

/* COPY */
function copyId(id){
navigator.clipboard.writeText(id);
alert("Copied: " + id);
}
</script>

</body>
</html>
